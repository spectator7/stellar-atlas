name: Validate site

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate content and runtime
        shell: bash
        run: |
          set -euo pipefail
          for script in scripts/validate-*.mjs; do
            node "$script"
          done
          node scripts/smoke-runtime.mjs
          node --check service-worker.js

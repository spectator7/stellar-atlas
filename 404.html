<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#090a0d" />
    <link rel="icon" href="/stellar-atlas/assets/mark.svg" type="image/svg+xml" />
    <title>没有找到这片星空 · 天象志</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, "Noto Sans SC", "Microsoft YaHei", sans-serif;
        background: #090a0d;
        color: #f4f1e8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        background-color: #090a0d;
      }

      main {
        width: min(680px, 100%);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: #c9a96b;
        font-size: 0.8rem;
        letter-spacing: 0.14em;
      }

      .brand img {
        width: 28px;
        height: 28px;
      }

      .code {
        margin: 72px 0 12px;
        color: #c9a96b;
        font: 500 clamp(3rem, 14vw, 7rem)/1 Georgia, serif;
      }

      h1 {
        max-width: 12em;
        margin: 0;
        font: 500 clamp(2rem, 7vw, 4.5rem)/1.15 Georgia, "Noto Serif SC", serif;
      }

      p {
        max-width: 34rem;
        margin: 24px 0 36px;
        color: #aaa69d;
        font-size: 1rem;
        line-height: 1.8;
      }

      a {
        min-height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 22px;
        border: 1px solid #c9a96b;
        border-radius: 4px;
        color: #090a0d;
        background: #c9a96b;
        font-weight: 700;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid #f4f1e8;
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <img src="/stellar-atlas/assets/mark.svg" alt="" />
        <span>天象志 · ASTRA SINICA</span>
      </div>
      <div class="code" aria-hidden="true">404</div>
      <h1>没有找到这片星空</h1>
      <p>这个地址可能已经移动，或者从未存在。返回图鉴首页，继续探索星座、今晚星空与跨文明天文故事。</p>
      <a href="/stellar-atlas/">返回天象志首页</a>
    </main>
  </body>
</html>
